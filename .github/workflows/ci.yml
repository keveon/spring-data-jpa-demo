name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify toolchain
        run: |
          java -version
          ./mvnw -version

      - name: Run tests
        run: ./mvnw -q test

      - name: Build package
        run: ./mvnw -q package -DskipTests
